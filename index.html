<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Currency to ARS Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-4">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800 mb-2">Currency Converter</h1>
                <p class="text-gray-600 text-sm">JPY/BRL/EUR → USD → ARS</p>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Select Currency</label>
                <select id="currency-select" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg">
                    <option value="JPY">Japanese Yen (JPY)</option>
                    <option value="BRL">Brazilian Real (BRL)</option>
                    <option value="EUR">Euro (EUR)</option>
                </select>
            </div>

            <div class="mb-6">
                <label id="currency-label" class="block text-sm font-medium text-gray-700 mb-2">Japanese Yen</label>
                <div class="relative">
                    <span id="currency-symbol" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">¥</span>
                    <input id="amount-input" type="number" placeholder="Enter JPY amount"
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg" />
                </div>
            </div>

            <div id="results" class="hidden space-y-4 mb-6">
                <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-green-600 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                            <span class="text-sm font-medium text-green-800">USD</span>
                        </div>
                        <span id="usd-result" class="text-lg font-bold text-green-800"></span>
                    </div>
                </div>
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-blue-600 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/>
                            </svg>
                            <span class="text-sm font-medium text-blue-800">ARS (Official)</span>
                        </div>
                        <span id="ars-oficial-result" class="text-lg font-bold text-blue-800"></span>
                    </div>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg border border-purple-200">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-purple-600 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
                            </svg>
                            <span class="text-sm font-medium text-purple-800">ARS (MEP)</span>
                        </div>
                        <span id="ars-mep-result" class="text-lg font-bold text-purple-800"></span>
                    </div>
                </div>
            </div>

            <button id="refresh-btn" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center">
                <svg id="refresh-icon" class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
                </svg>
                <span id="refresh-text">Refresh Rates</span>
            </button>

            <div id="error-box" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                <p id="error-text" class="text-sm text-red-800"></p>
            </div>
        </div>

        <div id="rates-box" class="hidden bg-white rounded-2xl shadow-xl p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Current Exchange Rates</h2>
            <div class="space-y-3 text-sm">
                <div class="flex justify-between">
                    <span class="text-gray-600">1 JPY =</span>
                    <span id="jpy-rate" class="font-medium"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">1 BRL =</span>
                    <span id="brl-rate" class="font-medium"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">1 EUR =</span>
                    <span id="eur-rate" class="font-medium"></span>
                </div>
                <div class="border-t border-gray-200 my-2 pt-2"></div>
                <div class="flex justify-between">
                    <span class="text-gray-600">1 USD = (Official)</span>
                    <span id="oficial-rate" class="font-medium"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">1 USD = (MEP)</span>
                    <span id="mep-rate" class="font-medium"></span>
                </div>
            </div>
            <div id="last-updated-box" class="hidden mt-4 pt-4 border-t border-gray-200">
                <p class="text-xs text-gray-500 text-center">
                    Last updated: <span id="last-updated"></span>
                    <span id="stored-indicator" class="hidden block mt-1 text-green-600">✓ Rates stored for offline use</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        const SYMBOLS = { JPY: '¥', BRL: 'R$', EUR: '€' };
        const NAMES   = { JPY: 'Japanese Yen', BRL: 'Brazilian Real', EUR: 'Euro' };

        let rates = {};
        let storedRates = null;

        const el = id => document.getElementById(id);

        function loadStored() {
            try { const s = localStorage.getItem('currencyRates'); return s ? JSON.parse(s) : null; }
            catch { return null; }
        }

        function saveStored(r, ts) {
            try { localStorage.setItem('currencyRates', JSON.stringify({ rates: r, timestamp: ts.toISOString() })); }
            catch {}
        }

        function updateCurrencyUI() {
            const c = el('currency-select').value;
            el('currency-label').textContent = NAMES[c];
            el('currency-symbol').textContent = SYMBOLS[c];
            el('amount-input').placeholder = `Enter ${c} amount`;
            calculate();
        }

        function calculate() {
            const c = el('currency-select').value;
            const amount = parseFloat(el('amount-input').value);
            const toUsd = { JPY: rates.jpyToUsd, BRL: rates.brlToUsd, EUR: rates.eurToUsd }[c];

            if (!amount || !toUsd || !rates.usdToArsOficial || !rates.usdToArsMep) {
                el('results').classList.add('hidden');
                return;
            }

            const usd = amount * toUsd;
            el('usd-result').textContent         = `$${usd.toFixed(2)}`;
            el('ars-oficial-result').textContent  = `$${(usd * rates.usdToArsOficial).toFixed(2)}`;
            el('ars-mep-result').textContent      = `$${(usd * rates.usdToArsMep).toFixed(2)}`;
            el('results').classList.remove('hidden');
        }

        function showRates(r, ts, fromStorage) {
            rates = r;
            el('jpy-rate').textContent    = `$${r.jpyToUsd?.toFixed(6)} USD`;
            el('brl-rate').textContent    = `$${r.brlToUsd?.toFixed(6)} USD`;
            el('eur-rate').textContent    = `$${r.eurToUsd?.toFixed(6)} USD`;
            el('oficial-rate').textContent = `$${r.usdToArsOficial?.toFixed(2)} ARS`;
            el('mep-rate').textContent    = `$${r.usdToArsMep?.toFixed(2)} ARS`;
            el('rates-box').classList.remove('hidden');
            el('last-updated').textContent = ts.toLocaleTimeString();
            el('last-updated-box').classList.remove('hidden');
            el('stored-indicator').classList.toggle('hidden', !fromStorage);
            calculate();
        }

        function setError(msg) {
            el('error-text').textContent = msg || '';
            el('error-box').classList.toggle('hidden', !msg);
        }

        function setLoading(on) {
            el('refresh-btn').disabled = on;
            el('refresh-icon').classList.toggle('spinning', on);
            el('refresh-text').textContent = on ? 'Updating Rates...' : 'Refresh Rates';
        }

        async function fetchRates() {
            setLoading(true);
            setError(null);
            try {
                const [jpy, brl, eur, oficial, mep] = await Promise.all([
                    fetch('https://api.exchangerate-api.com/v4/latest/JPY').then(r => r.json()),
                    fetch('https://api.exchangerate-api.com/v4/latest/BRL').then(r => r.json()),
                    fetch('https://api.exchangerate-api.com/v4/latest/EUR').then(r => r.json()),
                    fetch('https://dolarapi.com/v1/dolares/oficial').then(r => r.json()),
                    fetch('https://dolarapi.com/v1/dolares/bolsa').then(r => r.json()),
                ]);
                const newRates = {
                    jpyToUsd: jpy.rates.USD,
                    brlToUsd: brl.rates.USD,
                    eurToUsd: eur.rates.USD,
                    usdToArsOficial: oficial.venta,
                    usdToArsMep: mep.venta,
                };
                const ts = new Date();
                saveStored(newRates, ts);
                storedRates = { rates: newRates, timestamp: ts.toISOString() };
                showRates(newRates, ts, true);
            } catch {
                if (storedRates) {
                    showRates(storedRates.rates, new Date(storedRates.timestamp), true);
                    setError('Unable to fetch new rates. Using stored rates.');
                } else {
                    setError('Unable to fetch exchange rates. Please check your internet connection and try again.');
                }
            } finally {
                setLoading(false);
            }
        }

        storedRates = loadStored();
        el('currency-select').addEventListener('change', updateCurrencyUI);
        el('amount-input').addEventListener('input', calculate);
        el('refresh-btn').addEventListener('click', fetchRates);

        if (storedRates) {
            showRates(storedRates.rates, new Date(storedRates.timestamp), true);
        } else {
            fetchRates();
        }
    </script>
</body>
</html>
