<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency to ARS Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-4">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800 mb-2">Currency to ARS</h1>
                <p class="text-gray-600 text-sm">Any currency → USD → ARS</p>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Currency</label>
                <input list="currency-list" id="currency-input"
                    autocomplete="off" spellcheck="false"
                    placeholder="Type code or name (e.g. EUR, GBP)"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg" />
                <datalist id="currency-list"></datalist>
                <p id="currency-error" class="hidden mt-1 text-sm text-red-600">Unknown currency — try a 3-letter code like EUR or GBP.</p>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Amount</label>
                <input id="amount-input" type="number" inputmode="decimal" min="0" placeholder="Enter amount"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg" />
            </div>

            <div id="results" class="hidden space-y-4 mb-6">
                <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-green-600 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                            <span class="text-sm font-medium text-green-800">USD</span>
                        </div>
                        <span id="usd-result" class="text-lg font-bold text-green-800"></span>
                    </div>
                </div>
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-blue-600 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/>
                            </svg>
                            <span class="text-sm font-medium text-blue-800">ARS (Official)</span>
                        </div>
                        <span id="ars-oficial-result" class="text-lg font-bold text-blue-800"></span>
                    </div>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg border border-purple-200">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 text-purple-600 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
                            </svg>
                            <span class="text-sm font-medium text-purple-800">ARS (MEP)</span>
                        </div>
                        <span id="ars-mep-result" class="text-lg font-bold text-purple-800"></span>
                    </div>
                </div>
            </div>

            <button id="refresh-btn" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center">
                <svg id="refresh-icon" class="w-4 h-4 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
                </svg>
                <span id="refresh-text">Refresh Rates</span>
            </button>

            <div id="error-box" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                <p id="error-text" class="text-sm text-red-800"></p>
            </div>
        </div>

        <div id="rates-box" class="hidden bg-white rounded-2xl shadow-xl p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Exchange Rates</h2>
            <div class="space-y-3 text-sm">
                <div class="flex justify-between">
                    <span id="selected-rate-label" class="text-gray-600"></span>
                    <span id="selected-rate-value" class="font-medium"></span>
                </div>
                <div class="border-t border-gray-200 my-2 pt-2"></div>
                <div class="flex justify-between">
                    <span class="text-gray-600">1 USD (Official)</span>
                    <span id="oficial-rate" class="font-medium"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">1 USD (MEP)</span>
                    <span id="mep-rate" class="font-medium"></span>
                </div>
            </div>
            <div id="last-updated-box" class="hidden mt-4 pt-4 border-t border-gray-200">
                <p class="text-xs text-gray-500 text-center">
                    Last updated: <span id="last-updated"></span>
                    <span id="stored-indicator" class="hidden block mt-1 text-green-600">✓ Rates cached for offline use</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        const CURRENCIES = [
            { code: 'AED', name: 'UAE Dirham' },
            { code: 'AUD', name: 'Australian Dollar' },
            { code: 'BRL', name: 'Brazilian Real' },
            { code: 'CAD', name: 'Canadian Dollar' },
            { code: 'CHF', name: 'Swiss Franc' },
            { code: 'CLP', name: 'Chilean Peso' },
            { code: 'CNY', name: 'Chinese Yuan' },
            { code: 'COP', name: 'Colombian Peso' },
            { code: 'DKK', name: 'Danish Krone' },
            { code: 'EUR', name: 'Euro' },
            { code: 'GBP', name: 'British Pound' },
            { code: 'HKD', name: 'Hong Kong Dollar' },
            { code: 'HUF', name: 'Hungarian Forint' },
            { code: 'IDR', name: 'Indonesian Rupiah' },
            { code: 'ILS', name: 'Israeli Shekel' },
            { code: 'INR', name: 'Indian Rupee' },
            { code: 'JPY', name: 'Japanese Yen' },
            { code: 'KRW', name: 'South Korean Won' },
            { code: 'MXN', name: 'Mexican Peso' },
            { code: 'MYR', name: 'Malaysian Ringgit' },
            { code: 'NOK', name: 'Norwegian Krone' },
            { code: 'NZD', name: 'New Zealand Dollar' },
            { code: 'PHP', name: 'Philippine Peso' },
            { code: 'PLN', name: 'Polish Zloty' },
            { code: 'RON', name: 'Romanian Leu' },
            { code: 'SAR', name: 'Saudi Riyal' },
            { code: 'SEK', name: 'Swedish Krona' },
            { code: 'SGD', name: 'Singapore Dollar' },
            { code: 'THB', name: 'Thai Baht' },
            { code: 'TRY', name: 'Turkish Lira' },
            { code: 'TWD', name: 'Taiwan Dollar' },
            { code: 'UAH', name: 'Ukrainian Hryvnia' },
            { code: 'USD', name: 'US Dollar' },
            { code: 'UYU', name: 'Uruguayan Peso' },
            { code: 'ZAR', name: 'South African Rand' },
        ];

        const CURRENCY_CODES = new Set(CURRENCIES.map(c => c.code));

        // usdRates from API: { EUR: 0.92, JPY: 157.5, ... } means 1 USD = X currency
        // So: 1 currency = 1 / usdRates[code] USD
        let usdRates = {};
        let usdToArsOficial = null;
        let usdToArsMep = null;
        let storedData = null;
        let activeCurrencyCode = null;

        const el = id => document.getElementById(id);

        // Populate datalist
        CURRENCIES.forEach(({ code, name }) => {
            const opt = document.createElement('option');
            opt.value = `${code} — ${name}`;
            el('currency-list').appendChild(opt);
        });

        function parseCode(value) {
            const v = value.trim().toUpperCase();
            if (CURRENCY_CODES.has(v)) return v;
            const match = v.match(/^([A-Z]{2,4})\s*[—–-]/);
            if (match && CURRENCY_CODES.has(match[1])) return match[1];
            return null;
        }

        function loadStored() {
            try { const s = localStorage.getItem('arsRates'); return s ? JSON.parse(s) : null; }
            catch { return null; }
        }

        function saveStored(data) {
            try { localStorage.setItem('arsRates', JSON.stringify(data)); }
            catch {}
        }

        function fmt(amount, code) {
            try {
                return new Intl.NumberFormat('en-US', {
                    style: 'currency', currency: code,
                    minimumFractionDigits: 2, maximumFractionDigits: 2
                }).format(amount);
            } catch {
                return `${code} ${amount.toFixed(2)}`;
            }
        }

        function updateRatesCard() {
            if (!activeCurrencyCode || !usdRates[activeCurrencyCode]) return;
            const toUsd = 1 / usdRates[activeCurrencyCode];
            el('selected-rate-label').textContent = `1 ${activeCurrencyCode} =`;
            el('selected-rate-value').textContent = `${toUsd.toFixed(6)} USD`;
            el('oficial-rate').textContent = `${usdToArsOficial?.toFixed(2)} ARS`;
            el('mep-rate').textContent = `${usdToArsMep?.toFixed(2)} ARS`;
            el('rates-box').classList.remove('hidden');
        }

        function calculate() {
            const amount = parseFloat(el('amount-input').value);
            if (!activeCurrencyCode || !amount || !usdRates[activeCurrencyCode] || !usdToArsOficial || !usdToArsMep) {
                el('results').classList.add('hidden');
                return;
            }
            const usd = amount / usdRates[activeCurrencyCode];
            el('usd-result').textContent          = fmt(usd, 'USD');
            el('ars-oficial-result').textContent  = fmt(usd * usdToArsOficial, 'ARS');
            el('ars-mep-result').textContent      = fmt(usd * usdToArsMep, 'ARS');
            el('results').classList.remove('hidden');
        }

        function onCurrencyInput() {
            const inputVal = el('currency-input').value.trim();
            const code = parseCode(inputVal);
            el('currency-error').classList.toggle('hidden', !!code || !inputVal);
            activeCurrencyCode = code;
            if (code) {
                try { localStorage.setItem('lastCurrency', code); } catch {}
                updateRatesCard();
            }
            calculate();
        }

        function applyData(data, fromStorage) {
            usdRates = data.usdRates;
            usdToArsOficial = data.usdToArsOficial;
            usdToArsMep = data.usdToArsMep;
            const ts = new Date(data.timestamp);
            updateRatesCard();
            el('last-updated').textContent = ts.toLocaleTimeString();
            el('last-updated-box').classList.remove('hidden');
            el('stored-indicator').classList.toggle('hidden', !fromStorage);
            calculate();
        }

        function setError(msg) {
            el('error-text').textContent = msg || '';
            el('error-box').classList.toggle('hidden', !msg);
        }

        function setLoading(on) {
            el('refresh-btn').disabled = on;
            el('refresh-icon').classList.toggle('spinning', on);
            el('refresh-text').textContent = on ? 'Updating Rates...' : 'Refresh Rates';
        }

        async function fetchRates() {
            setLoading(true);
            setError(null);
            try {
                const [usdData, oficialData, mepData] = await Promise.all([
                    fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r => r.json()),
                    fetch('https://dolarapi.com/v1/dolares/oficial').then(r => r.json()),
                    fetch('https://dolarapi.com/v1/dolares/bolsa').then(r => r.json()),
                ]);
                const data = {
                    usdRates: usdData.rates,
                    usdToArsOficial: oficialData.venta,
                    usdToArsMep: mepData.venta,
                    timestamp: new Date().toISOString(),
                };
                saveStored(data);
                storedData = data;
                applyData(data, true);
            } catch {
                if (storedData) {
                    applyData(storedData, true);
                    setError('Unable to fetch new rates. Using cached rates.');
                } else {
                    setError('Unable to fetch exchange rates. Please check your connection.');
                }
            } finally {
                setLoading(false);
            }
        }

        // Init: restore last used currency, default to JPY
        storedData = loadStored();
        const lastCode = (() => { try { return localStorage.getItem('lastCurrency'); } catch { return null; } })();
        const defaultCode = (lastCode && CURRENCY_CODES.has(lastCode)) ? lastCode : 'JPY';
        activeCurrencyCode = defaultCode;
        const defaultCurrency = CURRENCIES.find(c => c.code === defaultCode);
        el('currency-input').value = `${defaultCurrency.code} — ${defaultCurrency.name}`;

        el('currency-input').addEventListener('input', onCurrencyInput);
        el('amount-input').addEventListener('input', calculate);
        el('refresh-btn').addEventListener('click', fetchRates);

        if (storedData) {
            applyData(storedData, true);
        } else {
            fetchRates();
        }
    </script>
</body>
</html>
