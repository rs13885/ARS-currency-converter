<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Currency to ARS Converter</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        const RefreshCw = ({ className, style }) => (
            <svg className={className} style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
        );

        const DollarSign = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
        );

        const Building = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4M8 6h.01M16 6h.01M12 6h.01M12 10h.01M12 14h.01M16 10h.01M16 14h.01M8 10h.01M8 14h.01"/>
            </svg>
        );

        const TrendingUp = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
            </svg>
        );

        function MultiCurrencyConverter() {
            const [selectedCurrency, setSelectedCurrency] = useState('JPY');
            const [amount, setAmount] = useState('');
            const [rates, setRates] = useState({
                jpyToUsd: null,
                brlToUsd: null,
                eurToUsd: null,
                usdToArsOficial: null,
                usdToArsMep: null
            });
            const [loading, setLoading] = useState(false);
            const [lastUpdated, setLastUpdated] = useState(null);
            const [error, setError] = useState(null);
            const [storedRates, setStoredRates] = useState(() => {
                const saved = localStorage.getItem('currencyRates');
                return saved ? JSON.parse(saved) : null;
            });

            useEffect(() => {
                if (storedRates) {
                    setRates(storedRates.rates);
                    setLastUpdated(new Date(storedRates.timestamp));
                } else {
                    fetchRates();
                }
            }, []);

            const saveRatesToStorage = (newRates, timestamp) => {
                const data = {
                    rates: newRates,
                    timestamp: timestamp.toISOString()
                };
                localStorage.setItem('currencyRates', JSON.stringify(data));
                setStoredRates(data);
            };

            const fetchRates = async () => {
                setLoading(true);
                setError(null);
                
                try {
                    const jpyResponse = await fetch('https://api.exchangerate-api.com/v4/latest/JPY');
                    const jpyData = await jpyResponse.json();
                    
                    const brlResponse = await fetch('https://api.exchangerate-api.com/v4/latest/BRL');
                    const brlData = await brlResponse.json();
                    
                    const eurResponse = await fetch('https://api.exchangerate-api.com/v4/latest/EUR');
                    const eurData = await eurResponse.json();
                    
                    const oficialResponse = await fetch('https://dolarapi.com/v1/dolares/oficial');
                    const oficialData = await oficialResponse.json();
                    
                    const mepResponse = await fetch('https://dolarapi.com/v1/dolares/bolsa');
                    const mepData = await mepResponse.json();
                    
                    const newRates = {
                        jpyToUsd: jpyData.rates.USD,
                        brlToUsd: brlData.rates.USD,
                        eurToUsd: eurData.rates.USD,
                        usdToArsOficial: oficialData.venta,
                        usdToArsMep: mepData.venta
                    };
                    
                    const timestamp = new Date();
                    
                    setRates(newRates);
                    setLastUpdated(timestamp);
                    saveRatesToStorage(newRates, timestamp);
                    
                } catch (err) {
                    if (storedRates) {
                        setRates(storedRates.rates);
                        setLastUpdated(new Date(storedRates.timestamp));
                        setError('Unable to fetch new rates. Using stored rates.');
                    } else {
                        setError('Unable to fetch exchange rates. Please check your internet connection and try again.');
                    }
                    console.error('Error fetching rates:', err);
                } finally {
                    setLoading(false);
                }
            };

            const calculateConversions = () => {
                const currencyToUsdRate = {
                    'JPY': rates.jpyToUsd,
                    'BRL': rates.brlToUsd,
                    'EUR': rates.eurToUsd
                };

                const toUsdRate = currencyToUsdRate[selectedCurrency];
                
                if (!amount || !toUsdRate || !rates.usdToArsOficial || !rates.usdToArsMep) {
                    return { usd: 0, arsOficial: 0, arsMep: 0 };
                }
                
                const inputAmount = parseFloat(amount);
                const usd = inputAmount * toUsdRate;
                const arsOficial = usd * rates.usdToArsOficial;
                const arsMep = usd * rates.usdToArsMep;
                
                return { usd, arsOficial, arsMep };
            };

            const { usd, arsOficial, arsMep } = calculateConversions();

            const currencySymbols = {
                'JPY': '¥',
                'BRL': 'R$',
                'EUR': '€'
            };

            const currencyNames = {
                'JPY': 'Japanese Yen',
                'BRL': 'Brazilian Real',
                'EUR': 'Euro'
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                    <div className="max-w-md mx-auto">
                        <div className="bg-white rounded-2xl shadow-xl p-6 mb-4">
                            <div className="text-center mb-6">
                                <h1 className="text-2xl font-bold text-gray-800 mb-2">Currency Converter</h1>
                                <p className="text-gray-600 text-sm">JPY/BRL/EUR → USD → ARS</p>
                            </div>
                            
                            <div className="mb-4">
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Select Currency
                                </label>
                                <select
                                    value={selectedCurrency}
                                    onChange={(e) => setSelectedCurrency(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                                >
                                    <option value="JPY">Japanese Yen (JPY)</option>
                                    <option value="BRL">Brazilian Real (BRL)</option>
                                    <option value="EUR">Euro (EUR)</option>
                                </select>
                            </div>

                            <div className="mb-6">
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    {currencyNames[selectedCurrency]}
                                </label>
                                <div className="relative">
                                    <span className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500">
                                        {currencySymbols[selectedCurrency]}
                                    </span>
                                    <input
                                        type="number"
                                        value={amount}
                                        onChange={(e) => setAmount(e.target.value)}
                                        placeholder={`Enter ${selectedCurrency} amount`}
                                        className="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                                    />
                                </div>
                            </div>

                            {amount && rates[`${selectedCurrency.toLowerCase()}ToUsd`] && (
                                <div className="space-y-4 mb-6">
                                    <div className="bg-green-50 p-4 rounded-lg border border-green-200">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center">
                                                <DollarSign className="w-5 h-5 text-green-600 mr-2" />
                                                <span className="text-sm font-medium text-green-800">USD</span>
                                            </div>
                                            <span className="text-lg font-bold text-green-800">
                                                ${usd.toFixed(2)}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="bg-blue-50 p-4 rounded-lg border border-blue-200">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center">
                                                <Building className="w-5 h-5 text-blue-600 mr-2" />
                                                <span className="text-sm font-medium text-blue-800">ARS (Official)</span>
                                            </div>
                                            <span className="text-lg font-bold text-blue-800">
                                                ${arsOficial.toFixed(2)}
                                            </span>
                                        </div>
                                    </div>

                                    <div className="bg-purple-50 p-4 rounded-lg border border-purple-200">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center">
                                                <TrendingUp className="w-5 h-5 text-purple-600 mr-2" />
                                                <span className="text-sm font-medium text-purple-800">ARS (MEP)</span>
                                            </div>
                                            <span className="text-lg font-bold text-purple-800">
                                                ${arsMep.toFixed(2)}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            <button
                                onClick={fetchRates}
                                disabled={loading}
                                className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-medium py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
                            >
                                <RefreshCw 
                                    className="w-4 h-4 mr-2" 
                                    style={loading ? { animation: 'spin 1s linear infinite' } : {}}
                                />
                                {loading ? 'Updating Rates...' : 'Refresh Rates'}
                            </button>

                            {error && (
                                <div className="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                                    <p className="text-sm text-red-800">{error}</p>
                                </div>
                            )}
                        </div>

                        {rates.jpyToUsd && (
                            <div className="bg-white rounded-2xl shadow-xl p-6">
                                <h2 className="text-lg font-semibold text-gray-800 mb-4">Current Exchange Rates</h2>
                                <div className="space-y-3 text-sm">
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">1 JPY =</span>
                                        <span className="font-medium">${rates.jpyToUsd?.toFixed(6)} USD</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">1 BRL =</span>
                                        <span className="font-medium">${rates.brlToUsd?.toFixed(6)} USD</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">1 EUR =</span>
                                        <span className="font-medium">${rates.eurToUsd?.toFixed(6)} USD</span>
                                    </div>
                                    <div className="border-t border-gray-200 my-2 pt-2"></div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">1 USD = (Official)</span>
                                        <span className="font-medium">${rates.usdToArsOficial?.toFixed(2)} ARS</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-gray-600">1 USD = (MEP)</span>
                                        <span className="font-medium">${rates.usdToArsMep?.toFixed(2)} ARS</span>
                                    </div>
                                </div>
                                
                                {lastUpdated && (
                                    <div className="mt-4 pt-4 border-t border-gray-200">
                                        <p className="text-xs text-gray-500 text-center">
                                            Last updated: {lastUpdated.toLocaleTimeString()}
                                            {storedRates && <span className="block mt-1 text-green-600">✓ Rates stored for offline use</span>}
                                        </p>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    <style>
                        {`@keyframes spin {
                            from { transform: rotate(0deg); }
                            to { transform: rotate(360deg); }
                        }`}
                    </style>
                </div>
            );
        }

        ReactDOM.render(<MultiCurrencyConverter />, document.getElementById('root'));
    </script>
</body>
</html>
